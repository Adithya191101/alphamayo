networks:
  microservices_network:
    driver: bridge
services:
  controller-0:
    build:
      context: /ephemeral/workspace/alpasim
      dockerfile: Dockerfile
      tags:
        - alpasim-base:0.70.0
    command:
      - -c
      - |-
        umask 0000
        uv run python -m alpasim_controller.server --port=6003 --log_dir=/mnt/output --log-level=INFO --config=/mnt/config/controller-config.yaml
    entrypoint: bash
    image: alpasim-base:0.70.0
    networks:
      - microservices_network
    pull_policy: missing
    volumes:
      - /workspace/alphamayo/documents/outputs/scenario_pedestrian/controller:/mnt/output
      - /workspace/alphamayo/documents/outputs/scenario_pedestrian:/mnt/config
      - /ephemeral/workspace/alpasim/src:/repo/src
      - /ephemeral/workspace/alpasim/plugins:/repo/plugins
  driver-0:
    build:
      context: /ephemeral/workspace/alpasim
      dockerfile: Dockerfile
      tags:
        - alpasim-base:0.70.0
    command:
      - -c
      - |-
        umask 0000
        uv run -m alpasim_driver.main --config-path=/mnt/output --config-name=driver-config.yaml host=0.0.0.0 port=6000
    deploy:
      resources:
        reservations:
          devices:
            - capabilities:
                - gpu
              device_ids:
                - '0'
              driver: nvidia
    entrypoint: bash
    image: alpasim-base:0.70.0
    networks:
      - microservices_network
    pull_policy: missing
    volumes:
      - /ephemeral/workspace/alpasim/data/drivers:/mnt/drivers
      - /workspace/alphamayo/documents/outputs/scenario_pedestrian:/mnt/output
      - /ephemeral/workspace/alpasim/src:/repo/src
      - /ephemeral/workspace/alpasim/plugins:/repo/plugins
      - /home/ubuntu/.cache/huggingface:/root/.cache/huggingface
  physics-0:
    build:
      context: /ephemeral/workspace/alpasim
      dockerfile: Dockerfile
      tags:
        - alpasim-base:0.70.0
    command:
      - -c
      - |-
        umask 0000
        uv run physics_server --host=0.0.0.0 --port=6002 --artifact-glob=/mnt/nre-data/scenesets/07f4467a46bf2fac4dfe355af9e93cd2/**/*.usdz --use-ground-mesh=true --cache-size=16 --log-level=INFO
    deploy:
      resources:
        reservations:
          devices:
            - capabilities:
                - gpu
              device_ids:
                - '0'
              driver: nvidia
    entrypoint: bash
    environment:
      - WARP_CACHE_PATH='/mnt/warp'
    image: alpasim-base:0.70.0
    networks:
      - microservices_network
    pull_policy: missing
    volumes:
      - /ephemeral/workspace/alpasim/data/nre-artifacts:/mnt/nre-data
      - /ephemeral/workspace/alpasim/src:/repo/src
      - /ephemeral/workspace/alpasim/plugins:/repo/plugins
  runtime-0:
    build:
      context: /ephemeral/workspace/alpasim
      dockerfile: Dockerfile
      tags:
        - alpasim-base:0.70.0
    command:
      - -c
      - |-
        umask 0000
        uv run python -m alpasim_runtime.simulate --usdz-glob=/mnt/nre-data/scenesets/07f4467a46bf2fac4dfe355af9e93cd2/**/*.usdz --user-config=/mnt/log_dir/generated-user-config-0.yaml --network-config=/mnt/log_dir/generated-network-config.yaml --log-dir=/mnt/log_dir --log-level=INFO --array-job-dir=/mnt/array_job_dir --eval-config=/mnt/log_dir/eval-config.yaml
    deploy:
      resources:
        reservations:
          devices:
            - capabilities:
                - gpu
              count: all
              driver: nvidia
    entrypoint: bash
    image: alpasim-base:0.70.0
    networks:
      - microservices_network
    pid: host
    pull_policy: missing
    volumes:
      - /ephemeral/workspace/alpasim/data/nre-artifacts:/mnt/nre-data
      - /workspace/alphamayo/documents/outputs/scenario_pedestrian:/mnt/log_dir
      - /workspace/alphamayo/documents/outputs/scenario_pedestrian:/mnt/array_job_dir
      - /ephemeral/workspace/alpasim/src:/repo/src
      - /ephemeral/workspace/alpasim/plugins:/repo/plugins
  sensorsim-0:
    command:
      - -c
      - |-
        umask 0000
        /app/internal/scripts/pycena/runtime/pycena_run serve-grpc --port=6001 --host=0.0.0.0 --artifact-glob=/mnt/nre-data/scenesets/07f4467a46bf2fac4dfe355af9e93cd2/**/*.usdz --egocar-hood-dir=/mnt/ego-hoods --no-enable-nrend --download-cache-dir /tmp/nre-cache-dir --cache-size=5 --max-workers=4 --enable-editing-actors
    deploy:
      resources:
        reservations:
          devices:
            - capabilities:
                - gpu
              device_ids:
                - '0'
              driver: nvidia
    entrypoint: bash
    environment:
      - OMP_NUM_THREADS=1
    image: nvcr.io/nvidia/nre/nre-ga:26.02
    networks:
      - microservices_network
    pull_policy: missing
    volumes:
      - /ephemeral/workspace/alpasim/data/nre-artifacts:/mnt/nre-data
      - /ephemeral/workspace/alpasim/data/nre-artifacts/ego-hoods:/mnt/ego-hoods
